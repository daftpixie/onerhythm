<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  
  <defs>
    <linearGradient id="heartbeatt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="50%" stop-color="#CC1A3D"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="signalLinet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="auroraFadet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowt">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlowt">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
    <g transform="translate(256, 265) scale(1.25)">
      <!-- Heart outline with centered QRS complex at cleft -->
      <path d="M0 160
        C0 160 -185 60 -185 -30
        C-185 -90 -148 -135 -95 -135
        C-58 -135 -28 -108 -8 -75
        L-3 -90 L5 -55 L15 -160 L25 -35 L33 -80
        C50 -108 80 -135 117 -135
        C165 -135 197 -90 197 -30
        C197 60 0 160 0 160Z"
        fill="none" stroke="url(#heartbeatt)" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowt)"/>
      
      <!-- Inner ECG trace line -->
      <path d="M-150 0 L-90 0 L-65 -10 L-48 15 L-28 -60 L-8 35 L8 -12 L25 0 L85 0 L160 0"
        fill="none" stroke="url(#signalLinet)" opacity="0.65" stroke-width="1.7600000000000002" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowt)"/>
      
      <!-- Pulse point at QRS peak -->
      <circle cx="15" cy="-160" r="2.8" fill="#00D4FF" opacity="0.9"/>
      
      <!-- Subtle pulse at heart tip -->
      <circle cx="0" cy="153" r="2" fill="#FF2D55" opacity="0.6"/>
    </g>
</svg>