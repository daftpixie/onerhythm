<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  
  <defs>
    <linearGradient id="heartbeatptsd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="50%" stop-color="#CC1A3D"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="signalLineptsd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="auroraFadeptsd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowptsd">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlowptsd">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0E1A"/>
  
  <!-- Atmospheric elements -->
  <ellipse cx="840" cy="252" rx="400" ry="300" fill="url(#auroraFadeptsd)" opacity="0.5"/>
  <ellipse cx="240" cy="504" rx="300" ry="200" fill="#7C3AED" opacity="0.03"/>
  
  <!-- Subtle grid lines suggesting mosaic -->
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#252B48" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="548" x2="1200" y2="548" stroke="#FF2D55" stroke-width="0.3" opacity="0.15"/>
  
  <!-- Decorative ECG trace across bottom -->
  <path d="M0 585 L200 585 L280 580 L320 595 L350 550 L380 610 L410 580 L440 585 L1200 585"
    fill="none" stroke="#FF2D55" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  
  
  <!-- Heart mark positioned right -->
  
    <g transform="translate(900, 200) scale(0.7)">
      <!-- Heart outline with QRS integration at the cleft -->
      <path d="M0 155
        C0 155 -175 55 -175 -30
        C-175 -85 -140 -130 -90 -130
        C-55 -130 -25 -105 0 -70
        L5 -85 L12 -50 L22 -155 L32 -30 L40 -75
        C60 -105 90 -130 125 -130
        C175 -130 210 -85 210 -30
        C210 55 35 155 0 155Z"
        fill="none" stroke="url(#heartbeatptsd)" stroke-width="6.428571428571429" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowptsd)"/>
      
      <!-- Inner ECG trace line -->
      <path d="M-140 0 L-80 0 L-55 -8 L-40 12 L-22 -55 L-5 30 L10 -10 L30 0 L90 0 L170 0"
        fill="none" stroke="url(#signalLineptsd)" stroke-width="3.1428571428571432" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" filter="url(#glowptsd)"/>
      
      <!-- Pulse point at QRS peak -->
      <circle cx="22" cy="-155" r="5.714285714285714" fill="#00D4FF" opacity="0.9"/>
      
      <!-- Subtle pulse at heart tip -->
      <circle cx="0" cy="148" r="4.285714285714286" fill="#FF2D55" opacity="0.6"/>
    </g>
  
  
  <!-- Content area (left-aligned) -->
  <text x="60" y="140" font-family="'Exo 2', 'Segoe UI', Arial, sans-serif" font-size="54" font-weight="700" fill="#F9FAFB">
    <tspan fill="#F9FAFB">One</tspan><tspan fill="#FF2D55">Rhythm</tspan>
  </text>
  
  
  
  
  <text x="60" y="530" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#9CA3AF" font-style="italic" opacity="0.7">The psychological consequences are killing people.</text>
  
  
  
  <!-- Bold stat callout -->
  <text x="60" y="260" font-family="'Exo 2', 'Segoe UI', Arial, sans-serif" font-size="86" font-weight="700" fill="#FF2D55" filter="url(#strongGlowptsd)">3.2×</text>
  <text x="60" y="300" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" font-size="22" fill="#9CA3AF">higher mortality risk from untreated PTSD in ICD patients.</text>
  
  
  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#heartbeatptsd)"/>
  
  <!-- URL / brand slug -->
  <text x="1140" y="530" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" font-size="14" fill="#9CA3AF" text-anchor="end" letter-spacing="2" opacity="0.5">onerhythm.org</text>
  <text x="1140" y="610" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="end" letter-spacing="1.5" opacity="0.35">VT INFINITE, INC.</text>
</svg>