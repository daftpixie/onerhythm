name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up API virtualenv
        run: pnpm setup:api

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: repo-checks
    env:
      NEXT_PUBLIC_ONERHYTHM_API_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @onerhythm/web run build

  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: repo-checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up API virtualenv
        run: pnpm setup:api

      - name: Build API
        run: pnpm --filter @onerhythm/api run build
